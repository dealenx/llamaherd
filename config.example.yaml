# LlamaHerd Configuration
# Copy this file to config.yaml and fill in your details.
#
# Then start: llamaherd --config config.yaml
# Or:       python -m llamaherd.proxy

# --- Upstream Ollama Cloud subscriptions ---
# Each key is an Ollama Cloud API key from https://ollama.com/settings/keys
# Stagger cycle_day across keys so there's always a fresh subscription available.
keys:
  - token: "sk-ollama-your-first-key-here"
    max_concurrent: 15          # Tested ~15-20 before hard 429s
    cycle_day: 1                # Billing reset day (1-28)
    label: "Subscription 1"
    # Optional: cookies for usage scraping from ollama.com/settings
    # Extract from browser DevTools → Application → Cookies → ollama.com
    # Required for session/weekly usage tracking
    cookies:
      secure_session: ""        # __Secure-session (REQUIRED, per-account)
      aid: ""                   # aid account ID (shared across accounts)
      cf_clearance: ""          # Cloudflare bypass (optional but recommended)
      stripe_mid: ""            # __stripe_mid (optional)

  - token: "sk-ollama-your-second-key-here"
    max_concurrent: 15
    cycle_day: 15
    label: "Subscription 2"
    cookies:
      secure_session: ""
      aid: ""
      cf_clearance: ""
      stripe_mid: ""

# --- Client API keys (one per consumer, for usage attribution) ---
# These are NOT real Ollama keys — they're internal tokens for tracking which
# service is making requests. Also manageable via /admin/clients API.
clients:
  - id: my-gateway
    label: "My Gateway Service"
    token: ocp-gateway-token-here
    # Optional rate limits (null or omit = unlimited)
    # daily_token_limit: 100000     # Max tokens (in+out) per day
    # daily_request_limit: 500      # Max requests per day
    # rpm_limit: 30                 # Max requests per minute

  - id: my-cli
    label: "My CLI Tool"
    token: ocp-cli-token-here

# --- Proxy settings ---
host: 127.0.0.1              # Bind address (0.0.0.0 for all interfaces)
port: 8399                    # Bind port
upstream: https://ollama.com/v1  # Ollama Cloud upstream URL
admin_token: "change-me-to-a-secure-random-string"  # Dashboard/API auth

# --- Health check & model refresh ---
health_check_interval: 300    # Seconds between model discovery refreshes

# --- Request handling ---
request_timeout: 120          # Seconds before giving up on upstream
queue_timeout: 60             # Seconds before giving up on queued request
retry_on_429: true            # Auto-retry on another key after 429
max_retries: 2                # Max retries per request

# --- Usage tracking ---
usage_db: ~/llamaherd/usage.db   # SQLite database path

# --- Subscription polling ---
# How often to poll /api/me for subscription status (seconds)
sub_poll_interval: 21600      # 6 hours

# --- Usage scraping ---
# How often to scrape ollama.com/settings for usage data (seconds)
# Requires cookies to be set for each key
usage_scrape_interval: 1800  # 30 minutes

# --- Fallback provider (optional) ---
# When configured, LlamaHerd can route requests to a secondary OpenAI-compatible
# upstream (e.g. NVIDIA Build) when a model isn't available on Ollama Cloud or
# all subscription keys are exhausted/at-capacity. The fallback speaks the same
# /v1/chat/completions protocol as Ollama Cloud — only base_url and api_key change.
#
# priority controls global routing:
#   after  (default) — Ollama first, fallback if model missing or all keys busy
#   before           — Fallback first; on hard failure, fall back to Ollama
#   only             — Use the fallback exclusively for mapped models
#
# model_map values may be a string (NVIDIA model name, inherits global priority)
# or an object: {nvidia_model: "...", priority: "before"} for per-model overrides.
# fallback:
#   provider: nvidia-build
#   base_url: https://integrate.api.nvidia.com/v1
#   api_key: nvapi-your-key-here
#   default_model: deepseek-ai/deepseek-v4-flash
#   priority: after
#   model_map:
#     glm4.7: z-ai/glm4.7
#     minimax-m2.5: minimaxai/minimax-m2.5
#     minimax-m2.7: minimaxai/minimax-m2.7
#     deepseek-v3.2: deepseek-ai/deepseek-v4-pro
#     deepseek-v3.2-flash: deepseek-ai/deepseek-v4-flash
#     qwen3-coder-480b: qwen/qwen3-coder-480b-a35b-instruct
#     gemma4:31b: google/gemma-4-31b-it
#     llama4-maverick: meta/llama-4-maverick-17b-128e-instruct
#     mistral-large3: mistralai/mistral-large-3-675b-instruct-2512
#     mistral-medium3.5: mistralai/mistral-medium-3.5-128b
#     kimi-k2.6: moonshotai/kimi-k2.6
#     # Per-model priority override:
#     # minimax-m2.7:
#     #   nvidia_model: minimaxai/minimax-m2.7
#     #   priority: before
#     #
#     # Do not map GLM-5/5.1 to NVIDIA Build unless the Build page marks them
#     # as Free Endpoint (nim_type_preview). NVIDIA /v1/models may list partner
#     # or download-only models that are not usable through the free trial API.